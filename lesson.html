<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111a45">
  <meta name="description" content="Интерактивный урок образовательной платформы AI & AR Lab">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/icon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/lesson.css">
  <title>Урок — AI & AR Lab</title>
</head>
<body class="lesson-page">
  <a class="skip-link" href="#theory">Перейти к содержанию урока</a>
  <header class="lesson-header">
    <a href="index.html#lessons" class="back-link">← К курсу</a>
    <span id="header-lesson-number">Урок</span>
    <div class="header-progress" aria-label="Прогресс урока"><span id="lesson-progress-bar"></span></div>
    <strong id="lesson-progress-text">0%</strong>
  </header>
  <aside class="lesson-nav" aria-label="Разделы урока">
    <button type="button" class="section-dot active" data-target="intro"><span>1</span>Старт</button>
    <button type="button" class="section-dot" data-target="theory"><span>2</span>Теория</button>
    <button type="button" class="section-dot" data-target="presentation"><span>3</span>Слайды</button>
    <button type="button" class="section-dot" data-target="practice"><span>4</span>Практика</button>
    <button type="button" class="section-dot" data-target="glossary"><span>5</span>Словарь</button>
    <button type="button" class="section-dot" data-target="quiz"><span>6</span>Тест</button>
    <button type="button" class="section-dot" data-target="finish"><span>7</span>Итог</button>
  </aside>
  <main class="lesson-main" id="lesson-content"></main>
  <script src="js/course-data.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/lesson.js"></script>
</body>
</html>
